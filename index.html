<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Sistem Absensi Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
        }

        .sidebar-item {
            transition: all 0.3s;
        }

        .sidebar-item:hover {
            background-color: #1e293b;
            color: white;
        }

        .active-menu {
            background-color: #3b82f6;
            color: white;
        }

        /* ===== HAMBURGER & MOBILE SIDEBAR ===== */
        #hamburger-btn {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 40px;
            height: 40px;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
            border: none;
            transition: background 0.2s;
        }

        #hamburger-btn:hover {
            background: #f1f5f9;
        }

        #hamburger-btn span {
            display: block;
            width: 22px;
            height: 2px;
            background: #475569;
            border-radius: 2px;
            transition: all 0.3s;
        }

        /* Mobile sidebar overlay */
        #mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background: rgba(0, 0, 0, 0.5);
            z-index: 40;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #mobile-overlay.active {
            display: block;
            opacity: 1;
        }

        /* Mobile sidebar drawer */
        #mobile-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            height: 100dvh;
            background: #0f172a;
            z-index: 50;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        #mobile-sidebar nav {
            overflow-y: auto;
        }

        #mobile-sidebar.open {
            transform: translateX(0);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            #hamburger-btn {
                display: flex;
            }

            /* Main padding on mobile */
            main.p-8 {
                padding: 1rem !important;
            }

            header.px-8 {
                padding-left: 1rem !important;
                padding-right: 1rem !important;
            }

            /* Rekap filter wrap vertically */
            #page-rekap .flex.flex-wrap {
                flex-direction: column;
            }

            #page-rekap .flex.flex-wrap>div,
            #page-rekap .flex.flex-wrap input {
                width: 100%;
            }

            #page-rekap .flex.gap-2 {
                flex-wrap: wrap;
            }

            #page-rekap .flex.gap-2 button {
                flex: 1;
            }

            /* Data page form stacks */
            #page-data .grid-cols-1 {
                gap: 0.75rem;
            }

            /* Settings grid 2→1 */
            #page-settings .grid.grid-cols-2 {
                grid-template-columns: 1fr !important;
            }

            /* Table horizontal scroll */
            .overflow-x-auto-mobile {
                overflow-x: auto;
            }
        }
    </style>
</head>

<body class="flex h-screen">

    <!-- Mobile Overlay (backdrop) -->
    <div id="mobile-overlay" onclick="closeMobileMenu()"></div>

    <!-- Mobile Sidebar Drawer -->
    <div id="mobile-sidebar" class="text-slate-300">
        <div class="p-6 text-center border-b border-slate-800">
            <h1 id="mobile-school-name" class="text-white font-bold text-lg uppercase tracking-wider">Loading...</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showPage('dashboard'); closeMobileMenu()"
                class="w-full flex items-center space-x-3 p-3 rounded-lg sidebar-item" id="m-btn-dashboard">
                <i class="fas fa-chart-line w-5"></i> <span>Dashboard</span>
            </button>
            <button onclick="showPage('absen'); closeMobileMenu()"
                class="w-full flex items-center space-x-3 p-3 rounded-lg sidebar-item" id="m-btn-absen">
                <i class="fas fa-user-check w-5"></i> <span>Absensi</span>
            </button>
            <button onclick="showPage('data'); closeMobileMenu()"
                class="w-full flex items-center space-x-3 p-3 rounded-lg sidebar-item" id="m-btn-data">
                <i class="fas fa-users w-5"></i> <span>Data Guru &amp; Staff</span>
            </button>
            <button onclick="showPage('rekap'); closeMobileMenu()"
                class="w-full flex items-center space-x-3 p-3 rounded-lg sidebar-item" id="m-btn-rekap">
                <i class="fas fa-file-invoice w-5"></i> <span>Rekap Absen</span>
            </button>
            <button onclick="showPage('settings'); closeMobileMenu()"
                class="w-full flex items-center space-x-3 p-3 rounded-lg sidebar-item" id="m-btn-settings">
                <i class="fas fa-cog w-5"></i> <span>Pengaturan</span>
            </button>
        </nav>
    </div>

    <!-- Sidebar -->
    <div class="w-64 bg-slate-900 text-slate-300 flex flex-col hidden md:flex">
        <div class="p-6 text-center border-b border-slate-800">
            <h1 id="side-school-name" class="text-white font-bold text-lg uppercase tracking-wider">Loading...</h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showPage('dashboard')"
                class="w-full flex items-center space-x-3 p-3 rounded-lg sidebar-item" id="btn-dashboard">
                <i class="fas fa-chart-line w-5"></i> <span>Dashboard</span>
            </button>
            <button onclick="showPage('absen')" class="w-full flex items-center space-x-3 p-3 rounded-lg sidebar-item"
                id="btn-absen">
                <i class="fas fa-user-check w-5"></i> <span>Absensi</span>
            </button>
            <button onclick="showPage('data')" class="w-full flex items-center space-x-3 p-3 rounded-lg sidebar-item"
                id="btn-data">
                <i class="fas fa-users w-5"></i> <span>Data Guru & Staff</span>
            </button>
            <button onclick="showPage('rekap')" class="w-full flex items-center space-x-3 p-3 rounded-lg sidebar-item"
                id="btn-rekap">
                <i class="fas fa-file-invoice w-5"></i> <span>Rekap Absen</span>
            </button>
            <button onclick="showPage('settings')"
                class="w-full flex items-center space-x-3 p-3 rounded-lg sidebar-item" id="btn-settings">
                <i class="fas fa-cog w-5"></i> <span>Pengaturan</span>
            </button>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-y-auto" style="overscroll-behavior: contain;">
        <header class="bg-white border-b p-4 flex justify-between items-center px-8">
            <div class="flex items-center gap-3">
                <!-- Hamburger button (visible on mobile only) -->
                <button id="hamburger-btn" onclick="openMobileMenu()" aria-label="Buka menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <h2 id="page-title" class="text-xl font-semibold text-slate-700">Dashboard</h2>
            </div>
            <div id="loading-spinner" class="hidden animate-spin rounded-full h-6 w-6 border-b-2 border-blue-500"></div>
        </header>

        <main class="p-8">
            <!-- Dashboard Page -->
            <div id="page-dashboard" class="page-content space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <p class="text-slate-500 text-sm">Total Guru</p>
                        <h3 id="stat-guru" class="text-3xl font-bold">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <p class="text-slate-500 text-sm">Total Staff</p>
                        <h3 id="stat-staff" class="text-3xl font-bold">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                        <p class="text-slate-500 text-sm">Absen Hari Ini</p>
                        <h3 id="stat-today" class="text-3xl font-bold">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 text-blue-600">
                        <p class="text-slate-500 text-sm">Status Server</p>
                        <h3 class="text-xl font-bold">Online</h3>
                    </div>
                </div>
                <div
                    class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 h-80 flex items-center justify-center">
                    <canvas id="absenChart"></canvas>
                </div>
            </div>

            <!-- Absen Page -->
            <div id="page-absen" class="page-content hidden max-w-2xl mx-auto space-y-6">
                <div class="bg-white p-8 rounded-xl shadow-lg border">
                    <h3 class="text-2xl font-bold text-center mb-6">Silahkan Absen</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Pilih Kategori</label>
                            <select id="abs-kategori" onchange="loadUserList()" class="w-full p-3 border rounded-lg">
                                <option value="Guru">Guru</option>
                                <option value="Staff">Staff</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Nama</label>
                            <select id="abs-user" onchange="cekStatusAbsen()" class="w-full p-3 border rounded-lg">
                                <option value="">Pilih Nama...</option>
                            </select>
                        </div>
                        <!-- Status Badge -->
                        <div id="abs-status-box" class="hidden rounded-lg p-3 text-sm font-medium border"></div>
                        <div class="grid grid-cols-2 gap-4 pt-2">
                            <button id="btn-datang" onclick="submitAbsen('Datang')"
                                class="bg-green-600 text-white p-4 rounded-xl hover:bg-green-700 font-bold transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                                <i class="fas fa-sign-in-alt mr-2"></i> ABSEN DATANG
                            </button>
                            <button id="btn-pulang" onclick="submitAbsen('Pulang')"
                                class="bg-orange-600 text-white p-4 rounded-xl hover:bg-orange-700 font-bold transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                                <i class="fas fa-sign-out-alt mr-2"></i> ABSEN PULANG
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Data Management Page -->
            <div id="page-data" class="page-content hidden space-y-8">
                <div class="bg-white p-6 rounded-xl shadow-sm">
                    <h4 class="font-bold mb-4">Input Data Baru</h4>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="text" id="inp-nip" placeholder="NIP (opsional)" class="p-2 border rounded w-full">
                        <input type="text" id="inp-nama" placeholder="Nama Lengkap (wajib)" class="p-2 border rounded w-full">
                        <select id="inp-jabatan" class="p-2 border rounded w-full">
                            <option value="Guru">Guru</option>
                            <option value="Staff">Staff</option>
                        </select>
                        <button onclick="tambahUser()"
                            class="bg-blue-600 text-white rounded p-2 hover:bg-blue-700 w-full">Simpan Data</button>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm overflow-x-auto">
                    <table class="w-full text-left min-w-[500px]">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4">NIP</th>
                                <th class="p-4">Nama</th>
                                <th class="p-4">Kategori</th>
                                <th class="p-4">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="table-user-body">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Rekap Page -->
            <div id="page-rekap" class="page-content hidden space-y-6">
                <div class="flex flex-wrap gap-4 items-end bg-white p-4 rounded-xl shadow-sm border">
                    <div>
                        <label class="block text-xs mb-1 font-medium text-slate-600">Bulan <span
                                class="text-slate-400">(wajib)</span></label>
                        <input type="month" id="rekap-bulan" onchange="sinkronTanggal()" class="p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-xs mb-1 font-medium text-slate-600">Tanggal <span
                                class="text-slate-400">(opsional)</span></label>
                        <input type="date" id="rekap-tanggal" class="p-2 border rounded">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="generateRekap()"
                            class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700">
                            <i class="fas fa-search mr-1"></i> Lihat Laporan
                        </button>
                        <button onclick="resetFilterRekap()"
                            class="bg-slate-200 text-slate-600 px-4 py-2 rounded-lg hover:bg-slate-300 text-sm">
                            <i class="fas fa-times mr-1"></i> Reset
                        </button>
                        <button onclick="printRekap()"
                            class="bg-slate-700 text-white px-6 py-2 rounded-lg hover:bg-slate-800">
                            <i class="fas fa-print mr-1"></i> Cetak / PDF
                        </button>
                    </div>
                </div>
                <div id="rekap-container" class="bg-white p-8 rounded-xl shadow-sm min-h-[400px]">
                    <div id="rekap-output" class="overflow-x-auto">
                        <p class="text-center text-slate-400 mt-20">Silahkan pilih periode rekap...</p>
                    </div>
                </div>
            </div>

            <!-- Settings Page -->
            <div id="page-settings" class="page-content hidden max-w-3xl mx-auto">
                <div class="bg-white p-8 rounded-xl shadow-sm border space-y-4">
                    <h3 class="font-bold text-lg border-b pb-2">Identitas Sekolah</h3>
                    <div class="grid grid-cols-1 gap-4">
                        <input type="text" id="set-nama-sekolah" placeholder="Nama Sekolah"
                            class="p-3 border rounded-lg w-full">
                        <!-- Logo Upload -->
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-2">Logo Sekolah</label>
                            <div class="flex items-center gap-4">
                                <div id="logo-preview-wrap" class="hidden">
                                    <img id="logo-preview" src="" alt="Logo"
                                        class="h-16 w-16 object-contain border rounded-lg bg-slate-50">
                                </div>
                                <div class="flex-1 space-y-2">
                                    <label
                                        class="flex items-center gap-2 cursor-pointer bg-slate-50 border-2 border-dashed border-slate-300 hover:border-indigo-400 rounded-lg p-3 transition-colors">
                                        <i class="fas fa-upload text-slate-400"></i>
                                        <span id="logo-file-label" class="text-sm text-slate-500">Pilih file gambar
                                            (JPG, PNG, GIF)...</span>
                                        <input type="file" id="set-logo-file" accept="image/*" class="hidden"
                                            onchange="previewLogo(this)">
                                    </label>
                                    <button type="button" onclick="hapusLogo()" id="btn-hapus-logo"
                                        class="hidden text-xs text-red-500 underline hover:text-red-700">
                                        <i class="fas fa-trash mr-1"></i>Hapus Logo
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="set-kepsek" placeholder="Nama Kepala Sekolah"
                                class="p-3 border rounded-lg">
                            <input type="text" id="set-nip-kepsek" placeholder="NIP Kepala Sekolah"
                                class="p-3 border rounded-lg">
                        </div>
                        <button onclick="saveSettings()" class="bg-green-600 text-white p-3 rounded-lg font-bold">Update
                            Pengaturan</button>
                        <button onclick="runSetup()" class="text-xs text-slate-400 underline">Reset / Setup Database
                            Ulang</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentUserData = [];
        let currentSettings = {};

        // ===== MOBILE MENU =====
        function openMobileMenu() {
            document.getElementById('mobile-sidebar').classList.add('open');
            const overlay = document.getElementById('mobile-overlay');
            overlay.style.display = 'block';
            document.body.classList.add('menu-open');
            // trigger transition
            requestAnimationFrame(() => overlay.classList.add('active'));
        }

        function closeMobileMenu() {
            document.getElementById('mobile-sidebar').classList.remove('open');
            document.body.classList.remove('menu-open');
            const overlay = document.getElementById('mobile-overlay');
            overlay.classList.remove('active');
            overlay.addEventListener('transitionend', function handler() {
                overlay.style.display = 'none';
                overlay.removeEventListener('transitionend', handler);
            });
        }

        // ===== NAVIGATION =====
        function showPage(pageId) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active-menu'));

            document.getElementById('page-' + pageId).classList.remove('hidden');
            // Highlight desktop sidebar
            const desktopBtn = document.getElementById('btn-' + pageId);
            if (desktopBtn) desktopBtn.classList.add('active-menu');
            // Highlight mobile sidebar
            const mobileBtn = document.getElementById('m-btn-' + pageId);
            if (mobileBtn) mobileBtn.classList.add('active-menu');

            const pageTitles = {
                dashboard: 'Dashboard',
                absen: 'Absensi',
                data: 'Data Guru & Staff',
                rekap: 'Rekap Absen',
                settings: 'Pengaturan'
            };
            document.getElementById('page-title').innerText = pageTitles[pageId] || pageId.toUpperCase();

            if (pageId === 'dashboard') loadStats();
            if (pageId === 'data') refreshTable();
            if (pageId === 'absen') loadUserList();
        }

        // Initialize
        window.onload = () => {
            loadGlobalSettings();
            showPage('dashboard');
        };

        function toggleLoading(show) {
            document.getElementById('loading-spinner').classList.toggle('hidden', !show);
        }

        function loadGlobalSettings() {
            google.script.run.withSuccessHandler(data => {
                currentSettings = data;
                const nama = data.nama_sekolah || "SISABSEN";
                document.getElementById('side-school-name').innerText = nama;
                // Sync to mobile sidebar
                const mobileNameEl = document.getElementById('mobile-school-name');
                if (mobileNameEl) mobileNameEl.innerText = nama;
                document.getElementById('set-nama-sekolah').value = data.nama_sekolah || "";
                document.getElementById('set-kepsek').value = data.kepala_sekolah || "";
                document.getElementById('set-nip-kepsek').value = data.nip_kepsek || "";
                // Tampilkan preview logo jika ada
                const logoUrl = data.logo_url || "";
                if (logoUrl) {
                    document.getElementById('logo-preview').src = logoUrl;
                    document.getElementById('logo-preview-wrap').classList.remove('hidden');
                    document.getElementById('logo-file-label').textContent = 'Logo tersimpan (pilih file baru untuk max 500kb)';
                    document.getElementById('btn-hapus-logo').classList.remove('hidden');
                } else {
                    document.getElementById('logo-preview-wrap').classList.add('hidden');
                    document.getElementById('logo-file-label').textContent = 'Pilih file gambar (JPG, PNG, GIF)...';
                    document.getElementById('btn-hapus-logo').classList.add('hidden');
                }
            }).getSettings();
        }

        function previewLogo(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            if (file.size > 500 * 1024) {
                alert('Maksimum ukuran file 500KB.');
                input.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('logo-preview').src = e.target.result;
                document.getElementById('logo-preview-wrap').classList.remove('hidden');
                document.getElementById('logo-file-label').textContent = file.name;
                document.getElementById('btn-hapus-logo').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function hapusLogo() {
            if (!confirm('Hapus logo sekolah?')) return;
            // Reset preview
            document.getElementById('logo-preview').src = '';
            document.getElementById('logo-preview-wrap').classList.add('hidden');
            document.getElementById('logo-file-label').textContent = 'Pilih file gambar (JPG, PNG, GIF)...';
            document.getElementById('btn-hapus-logo').classList.add('hidden');
            document.getElementById('set-logo-file').value = '';
            // Simpan dengan logo kosong
            currentSettings.logo_url = '';
            const obj = {
                nama_sekolah: currentSettings.nama_sekolah || '',
                kepala_sekolah: currentSettings.kepala_sekolah || '',
                nip_kepsek: currentSettings.nip_kepsek || '',
                logo_url: ''
            };
            google.script.run.withSuccessHandler(() => {
                alert('Logo berhasil dihapus!');
                loadGlobalSettings();
            }).updateSettings(obj);
        }

        function loadStats() {
            toggleLoading(true);
            google.script.run.withSuccessHandler(stats => {
                document.getElementById('stat-guru').innerText = stats.total_guru;
                document.getElementById('stat-staff').innerText = stats.total_staff;
                document.getElementById('stat-today').innerText = stats.absen_hari_ini;
                renderChart(stats.datang, stats.pulang);
                toggleLoading(false);
            }).getStats();
        }

        function renderChart(datang, pulang) {
            if (window.myChart) {
                window.myChart.destroy();
                window.myChart = null;
            }
            const canvas = document.getElementById('absenChart');
            // Reset ukuran canvas agar Chart.js hitung ulang dimensi yang benar
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            const ctx = canvas.getContext('2d');
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Absen Datang', 'Absen Pulang'],
                    datasets: [{
                        label: 'Jumlah Kehadiran Hari Ini',
                        data: [datang, pulang],
                        backgroundColor: ['#10b981', '#f59e0b'],
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'top' }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1, precision: 0 }
                        }
                    }
                }
            });
        }

        function loadUserList() {
            const kat = document.getElementById('abs-kategori').value;
            // Reset status saat ganti kategori
            resetStatusAbsen();
            google.script.run.withSuccessHandler(data => {
                currentUserData = data;
                let html = '<option value="">Pilih Nama...</option>';
                data.forEach((u, idx) => {
                    const label = u.nip ? `${u.nama} (${u.nip})` : u.nama;
                    html += `<option value="${idx}">${label}</option>`;
                });
                document.getElementById('abs-user').innerHTML = html;
            }).getData(kat);
        }

        function resetStatusAbsen() {
            const box = document.getElementById('abs-status-box');
            box.classList.add('hidden');
            box.innerHTML = '';
            document.getElementById('btn-datang').disabled = false;
            document.getElementById('btn-pulang').disabled = false;
        }

        function cekStatusAbsen() {
            const idx = document.getElementById('abs-user').value;
            if (idx === '') { resetStatusAbsen(); return; }

            const user = currentUserData[parseInt(idx)];
            if (!user) { resetStatusAbsen(); return; }

            // Gunakan NIP jika ada, jika tidak gunakan nama sebagai identifier
            const identifier = user.nip || user.nama;

            toggleLoading(true);
            google.script.run
                .withSuccessHandler(status => {
                    toggleLoading(false);
                    updateStatusAbsen(status);
                })
                .withFailureHandler(() => toggleLoading(false))
                .getStatusAbsenHariIni(identifier);
        }

        function updateStatusAbsen(status) {
            const box = document.getElementById('abs-status-box');
            const btnDatang = document.getElementById('btn-datang');
            const btnPulang = document.getElementById('btn-pulang');

            // Reset dulu
            btnDatang.disabled = false;
            btnPulang.disabled = false;

            if (status.sudahDatang && status.sudahPulang) {
                // Sudah datang & pulang — keduanya dikunci
                box.className = 'rounded-lg p-3 text-sm font-medium border bg-slate-100 text-slate-600 border-slate-300';
                box.innerHTML = ' Sudah absen <b>Datang</b> dan <b>Pulang</b> hari ini. Absensi selesai.';
                btnDatang.disabled = true;
                btnPulang.disabled = true;
            } else if (status.sudahDatang) {
                // Sudah datang, belum pulang
                box.className = 'rounded-lg p-3 text-sm font-medium border bg-green-50 text-green-700 border-green-300';
                box.innerHTML = ' Sudah absen <b>Datang</b>. Silahkan absen <b>Pulang</b> saat selesai.';
                btnDatang.disabled = true;
                btnPulang.disabled = false;
            } else {
                // Belum datang sama sekali
                box.className = 'rounded-lg p-3 text-sm font-medium border bg-yellow-50 text-yellow-700 border-yellow-300';
                box.innerHTML = ' Belum absen datang hari ini. Silahkan absen <b>Datang</b> terlebih dahulu.';
                btnDatang.disabled = false;
                btnPulang.disabled = true;
            }
            box.classList.remove('hidden');
        }

        function submitAbsen(tipe) {
            const idx = document.getElementById('abs-user').value;
            if (idx === '') return alert("Pilih nama terlebih dahulu!");

            const user = currentUserData[parseInt(idx)];
            if (!user) return alert("Data user tidak ditemukan!");

            // Gunakan NIP jika ada, jika tidak gunakan nama sebagai identifier
            const identifier = user.nip || user.nama;

            const payload = {
                id: identifier,
                nama: user.nama,
                kategori: document.getElementById('abs-kategori').value,
                tipe: tipe
            };

            toggleLoading(true);
            google.script.run
                .withSuccessHandler(res => {
                    toggleLoading(false);
                    alert(res.pesan);
                    if (res.ok) {
                        // Update status UI setelah absen berhasil
                        cekStatusAbsen();
                    }
                })
                .withFailureHandler(err => {
                    toggleLoading(false);
                    alert("Terjadi error: " + err.message);
                })
                .submitAbsen(payload);
        }

        function tambahUser() {
            const nip = document.getElementById('inp-nip').value.trim();
            const nama = document.getElementById('inp-nama').value.trim();
            const jabatan = document.getElementById('inp-jabatan').value;
            if (!nama) return alert('Nama wajib diisi!');

            toggleLoading(true);
            google.script.run
                .withSuccessHandler(res => {
                    toggleLoading(false);
                    if (res && res.ok === false) {
                        alert('Gagal menyimpan:\n' + res.pesan);
                    } else {
                        alert('Data berhasil disimpan!');
                        // Reset form input
                        document.getElementById('inp-nip').value = '';
                        document.getElementById('inp-nama').value = '';
                        refreshTable();
                    }
                })
                .withFailureHandler(err => {
                    toggleLoading(false);
                    alert('Error: ' + err.message);
                })
                .saveData(jabatan, [nip, nama, jabatan]);
        }

        function refreshTable() {
            google.script.run.withSuccessHandler(gurus => {
                let html = "";
                gurus.forEach((g, idx) => {
                    const nipDisplay = g.nip || '<span class="text-slate-400 italic text-xs">-</span>';
                    html += `<tr class="border-b">
                        <td class="p-4">${nipDisplay}</td>
                        <td class="p-4">${g.nama}</td>
                        <td class="p-4 text-blue-600 font-semibold">Guru</td>
                        <td class="p-4">
                            <button onclick="editUser(${idx}, '${g.nip || ''}', '${g.nama.replace(/'/g, "\\'")}', 'Guru')" class="bg-yellow-400 hover:bg-yellow-500 text-white text-xs font-semibold px-3 py-1.5 rounded mr-2">
                                <i class="fas fa-edit mr-1"></i>Edit
                            </button>
                            <button onclick="hapusUser(${idx}, '${g.nama.replace(/'/g, "\\'")}', 'Guru')" class="bg-red-500 hover:bg-red-600 text-white text-xs font-semibold px-3 py-1.5 rounded">
                                <i class="fas fa-trash mr-1"></i>Hapus
                            </button>
                        </td>
                    </tr>`;
                });
                google.script.run.withSuccessHandler(staffs => {
                    staffs.forEach((s, idx) => {
                        const nipDisplay = s.nip || '<span class="text-slate-400 italic text-xs">-</span>';
                        html += `<tr class="border-b">
                            <td class="p-4">${nipDisplay}</td>
                            <td class="p-4">${s.nama}</td>
                            <td class="p-4 text-orange-600 font-semibold">Staff</td>
                            <td class="p-4">
                                <button onclick="editUser(${idx}, '${s.nip || ''}', '${s.nama.replace(/'/g, "\\'")}', 'Staff')" class="bg-yellow-400 hover:bg-yellow-500 text-white text-xs font-semibold px-3 py-1.5 rounded mr-2">
                                    <i class="fas fa-edit mr-1"></i>Edit
                                </button>
                                <button onclick="hapusUser(${idx}, '${s.nama.replace(/'/g, "\\'")}', 'Staff')" class="bg-red-500 hover:bg-red-600 text-white text-xs font-semibold px-3 py-1.5 rounded">
                                    <i class="fas fa-trash mr-1"></i>Hapus
                                </button>
                            </td>
                        </tr>`;
                    });
                    document.getElementById('table-user-body').innerHTML = html;
                }).getData('Staff');
            }).getData('Guru');
        }

        function hapusUser(rowIdx, nama, kategori) {
            if (!confirm(`Yakin ingin menghapus data "${nama}"?`)) return;
            toggleLoading(true);
            google.script.run.withSuccessHandler(res => {
                alert(res || "Data berhasil dihapus!");
                refreshTable();
                toggleLoading(false);
            }).withFailureHandler(err => {
                alert("Gagal menghapus: " + err.message);
                toggleLoading(false);
            }).deleteData(kategori, rowIdx);
        }

        function editUser(rowIdx, nipLama, nama, kategori) {
            const nipBaru = prompt('Edit NIP (kosongkan jika tidak punya):', nipLama);
            if (nipBaru === null) return;
            const namaBaru = prompt('Edit Nama:', nama);
            if (namaBaru === null) return;
            if (!namaBaru.trim()) return alert('Nama tidak boleh kosong!');

            toggleLoading(true);
            google.script.run
                .withSuccessHandler(res => {
                    toggleLoading(false);
                    if (res && res.ok === false) {
                        alert('Gagal mengubah:\n' + res.pesan);
                    } else {
                        alert(res.pesan || 'Data berhasil diperbarui!');
                        refreshTable();
                    }
                })
                .withFailureHandler(err => {
                    toggleLoading(false);
                    alert('Error: ' + err.message);
                })
                .updateData(kategori, rowIdx, [nipBaru.trim(), namaBaru.trim(), kategori]);
        }

        function saveSettings() {
            const nama_sekolah = document.getElementById('set-nama-sekolah').value;
            const kepala_sekolah = document.getElementById('set-kepsek').value;
            const nip_kepsek = document.getElementById('set-nip-kepsek').value;
            const fileInput = document.getElementById('set-logo-file');

            const doSave = (logo_url) => {
                const obj = { nama_sekolah, kepala_sekolah, nip_kepsek, logo_url };
                toggleLoading(true);
                google.script.run
                    .withSuccessHandler(() => {
                        toggleLoading(false);
                        alert('Pengaturan diperbarui!');
                        loadGlobalSettings();
                    })
                    .withFailureHandler(err => {
                        toggleLoading(false);
                        alert('Gagal menyimpan: ' + err.message);
                    })
                    .updateSettings(obj);
            };

            if (fileInput.files && fileInput.files[0]) {
                // Ada file baru dipilih — konversi ke base64 dulu
                const reader = new FileReader();
                reader.onload = e => doSave(e.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                // Tidak ada file baru — pakai logo yang sudah tersimpan
                const logoTersimpan = (currentSettings && currentSettings.logo_url) || '';
                doSave(logoTersimpan);
            }
        }

        function sinkronTanggal() {
            // Jika bulan diubah, reset input tanggal agar tidak konflik
            document.getElementById('rekap-tanggal').value = '';
        }

        function resetFilterRekap() {
            document.getElementById('rekap-bulan').value = '';
            document.getElementById('rekap-tanggal').value = '';
            document.getElementById('rekap-output').innerHTML =
                '<p class="text-center text-slate-400 mt-20">Silahkan pilih periode rekap...</p>';
        }

        function generateRekap() {
            const bulan = document.getElementById('rekap-bulan').value;
            const tanggal = document.getElementById('rekap-tanggal').value;
            if (!bulan) return alert('Pilih bulan terlebih dahulu!');

            toggleLoading(true);
            document.getElementById('rekap-output').innerHTML = '<p class="text-center text-slate-400 mt-20">Memuat data...</p>';

            const onSuccess = data => {
                toggleLoading(false);
                if (!data || data.length === 0) {
                    document.getElementById('rekap-output').innerHTML =
                        '<p class="text-center text-slate-400 mt-20">Tidak ada data absensi untuk periode ini.</p>';
                    return;
                }

                // Label judul sesuai filter
                const [year, month] = bulan.split('-');
                const namaBulan = new Date(year, month - 1).toLocaleString('id-ID', { month: 'long', year: 'numeric' });
                const judulPeriode = tanggal
                    ? new Date(tanggal).toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
                    : namaBulan;

                let html = `<h3 class="font-bold text-base mb-3">Rekap Absensi - ${judulPeriode} <span class="text-slate-400 font-normal text-sm">(${data.length} data)</span></h3>`;
                html += `<table class="w-full border-collapse border mt-2 text-sm">
                    <thead><tr class="bg-slate-100">
                        <th class="border p-2 text-left">#</th>
                        <th class="border p-2 text-left">Tanggal/Jam</th>
                        <th class="border p-2 text-left">NIP</th>
                        <th class="border p-2 text-left">Nama</th>
                        <th class="border p-2 text-left">Kategori</th>
                        <th class="border p-2 text-left">Tipe</th>
                    </tr></thead><tbody>`;

                data.forEach((f, idx) => {
                    const tipeBadge = f.tipe === 'Datang'
                        ? `<span style="color:#16a34a;font-weight:600">Datang</span>`
                        : `<span style="color:#ea580c;font-weight:600">Pulang</span>`;
                    html += `<tr class="${idx % 2 === 0 ? '' : 'bg-slate-50'}">
                        <td class="border p-2">${idx + 1}</td>
                        <td class="border p-2">${f.timestamp}</td>
                        <td class="border p-2">${f.nip}</td>
                        <td class="border p-2">${f.nama}</td>
                        <td class="border p-2">${f.kategori || '-'}</td>
                        <td class="border p-2">${tipeBadge}</td>
                    </tr>`;
                });

                html += `</tbody></table>`;
                document.getElementById('rekap-output').innerHTML = html;
            };

            const onError = err => {
                document.getElementById('rekap-output').innerHTML =
                    `<p class="text-center text-red-500 mt-20">Error: ${err.message}</p>`;
                toggleLoading(false);
            };

            if (tanggal) {
                // Filter per tanggal spesifik
                google.script.run
                    .withSuccessHandler(onSuccess)
                    .withFailureHandler(onError)
                    .getRekapTanggal(tanggal);
            } else {
                // Filter per bulan
                google.script.run
                    .withSuccessHandler(onSuccess)
                    .withFailureHandler(onError)
                    .getRekapBulan(bulan);
            }
        }
